name: Move LeetCode Solutions

on:
  workflow_dispatch:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'

permissions:
  contents: write

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Move LeetCode solutions
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p LeetCode

          found=0
          for d in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$d" ]; then
              target="LeetCode/$d"

              if [ -e "$target" ]; then
                echo "Target already exists, skipping: $target"
                continue
              fi

              echo "Moving $d -> $target"
              mv "$d" "$target"
              found=1
            fi
          done

          if [ $found -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        shell: bash
        run: |
          set -euo pipefail

          if git status --porcelain | grep .; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: move LeetCode solutions to LeetCode folder"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No changes to commit"
          fi